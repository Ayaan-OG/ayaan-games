<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The OG Games</title>

<!-- ICON -->
<link rel="icon" type="image/png" href="icon.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

/* 🔥 CANVAS BACKGROUND */
#bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* HEADER */
header {
    background: #111;
    padding: 20px;
    text-align: center;
}

h1 {
    color: red;
}

/* CONTAINER */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* GAME CARD */
.game-card {
    background: #1a1a1a;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.game-card img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔥 ANIMATED BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<header>
    <h1>The OG Games</h1>
    <p>Download The Thrill 🎮</p>
</header>

<div class="container" id="games"></div>

<script>
/* ================= BACKGROUND ANIMATION ================= */
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// particles
for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 3,
        speedX: (Math.random() - 0.5),
        speedY: (Math.random() - 0.5)
    });
}

function animateBG() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        if (p.x > canvas.width) p.x = 0;
        if (p.x < 0) p.x = canvas.width;
        if (p.y > canvas.height) p.y = 0;
        if (p.y < 0) p.y = canvas.height;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,0,100,0.7)";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "hotpink";
        ctx.fill();
    });

    requestAnimationFrame(animateBG);
}
animateBG();

/* ================= GAME LIST ================= */
const games = [
    {
        name: "MR.FUNKY MAMBA",
        desc: "Neon RGB snake game with glowing effects",
        img: "icon.png",
        link: "https://og13ayaan.itch.io/mr-funky-mamba"
    },
    {
        name: "Dooms Day Fighter",
        desc: "Horror FPS survival game",
        img: "https://via.placeholder.com/300x200",
        link: "https://og13ayaan.itch.io/dooms-day-fighter"
    }
];

const container = document.getElementById("games");

games.forEach(game => {
    container.innerHTML += `
        <div class="game-card">
            <img src="${game.img}">
            <h2>${game.name}</h2>
            <p>${game.desc}</p>
            <button onclick="download('${game.link}')">Download</button>
        </div>
    `;
});

function download(link) {
    window.open(link, "_blank");
}
</script>

</body>
</html>
