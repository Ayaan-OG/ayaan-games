<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The OG Games</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

header {
    background: #111;
    padding: 20px;
    text-align: center;
}

h1 {
    color: red;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.game-card {
    background: #1a1a1a;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.game-card img {
    width: 100%;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <h1>The OG Games</h1>
    <p>Download The Thrill 🎮</p>
</header>

<div class="container" id="games"></div>

<script>
const games = [
    {
        name: "Dooms Day Fighter",
        desc: "Horror FPS survival game",
        img: "https://via.placeholder.com/300x200",
        link: "https://og13ayaan.itch.io/dooms-day-fighter"
    }
];

const container = document.getElementById("games");

games.forEach(game => {
    container.innerHTML += `
        <div class="game-card">
            <img src="${game.img}">
            <h2>${game.name}</h2>
            <p>${game.desc}</p>
            <button onclick="download('${game.link}')">Download</button>
        </div>
    `;
});

function download(link) {
    window.location.href = link;
}
</script>

</body>
</html>
