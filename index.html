<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The OG Games</title>

<!-- 🔥 TAB ICON -->
<link rel="icon" type="image/png" href="icon.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #111, #1a1a1a);
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 20px red;
}

h1 {
    color: red;
    font-size: 40px;
    text-shadow: 0 0 10px red;
}

/* CONTAINER */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* GAME CARD */
.game-card {
    background: #1a1a1a;
    margin: 15px;
    padding: 15px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 0 10px #000;
}

.game-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px red;
}

.game-card img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 12px;
    background: linear-gradient(45deg, red, hotpink);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(45deg, hotpink, red);
    box-shadow: 0 0 15px hotpink;
}
</style>
</head>

<body>

<header>
    <h1>The OG Games</h1>
    <p>Download The Thrill 🎮🔥</p>
</header>

<div class="container" id="games"></div>

<script>
const games = [
    {
        name: "MR.FUNKY MAMBA",
        desc: "Neon RGB snake game with glowing effects",
        img: "icon.png",   // 🔥 your icon here
        link: "https://og13ayaan.itch.io/mr-funky-mamba"
    },
    {
        name: "Dooms Day Fighter",
        desc: "Horror FPS survival game",
        img: "https://via.placeholder.com/300x200",
        link: "https://og13ayaan.itch.io/dooms-day-fighter"
    }
];

const container = document.getElementById("games");

games.forEach(game => {
    container.innerHTML += `
        <div class="game-card">
            <img src="${game.img}">
            <h2>${game.name}</h2>
            <p>${game.desc}</p>
            <button onclick="download('${game.link}')">
                Download The Thrill 🔥
            </button>
        </div>
    `;
});

function download(link) {
    window.open(link, "_blank");
}
</script>

</body>
</html>
